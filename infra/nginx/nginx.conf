worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                off;   # HLS .ts segments are already binary — do NOT gzip

    # -------------------------------------------------------------------------
    # HLS segment caching (proxy cache for MinIO)
    # Caches .ts segments locally for fast re-delivery; keys expire per segment TTL
    # -------------------------------------------------------------------------
    proxy_cache_path /var/cache/nginx/hls
        levels=1:2
        keys_zone=hls_cache:20m
        max_size=4g
        inactive=1h
        use_temp_path=off;

    # -------------------------------------------------------------------------
    # Security headers (applied globally)
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=key_limit:10m  rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}

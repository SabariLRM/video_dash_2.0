# =============================================================================
# HUB 2.0 — Nginx Virtual Host (Local Storage Edition)
# HLS files served from local disk (/var/hls) instead of MinIO
# =============================================================================

upstream api_backend {
    server api:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # =========================================================================
    # API Proxy  →  Express (port 4000)
    # =========================================================================
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload body limit: 2 GB
        client_max_body_size 2048m;

        # Rate limiting on API (30 req/min, burst 20)
        limit_req zone=api_limit burst=20 nodelay;
    }

    # =========================================================================
    # Key delivery endpoint — tight rate limit, no caching ever
    # =========================================================================
    location /api/keys/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
        proxy_set_header   Authorization $http_authorization;

        # Never cache AES keys
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        limit_req zone=key_limit burst=5 nodelay;
    }

    # =========================================================================
    # HLS Playlist + Segment Delivery  →  Local disk (/var/hls)
    #
    # SECURITY:
    #  - auth_request calls /internal/auth/validate-hls before serving any file
    #  - Returns 401 if JWT is invalid/missing
    #  - /var/hls is read-only inside Nginx (never writable via HTTP)
    #  - .m3u8 playlists: no-cache (dynamic during live streams)
    #  - .ts segments: cached 5 min (they never change after transcode)
    # =========================================================================
    location /hls/ {
        # JWT validation before any file is served
        auth_request     /internal/auth/validate-hls;
        auth_request_set $auth_status $upstream_status;

        # Serve from local disk (volume mount: ./storage/hls → /var/hls)
        root /var;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # ---- Never cache playlists ----
        location ~* ^/hls/.*\.m3u8$ {
            auth_request /internal/auth/validate-hls;
            root /var;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # ---- Cache encrypted .ts segments (5 min) ----
        location ~* ^/hls/.*\.ts$ {
            auth_request /internal/auth/validate-hls;
            root /var;
            add_header Cache-Control "public, max-age=300" always;
        }
    }

    # =========================================================================
    # Internal auth sub-request (only called by Nginx auth_request directive)
    # =========================================================================
    location = /internal/auth/validate-hls {
        internal;
        proxy_pass              http://api_backend/api/auth/validate-hls;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        X-Forwarded-For $remote_addr;
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        Authorization $http_authorization;
    }

    # =========================================================================
    # BLOCK all /internal/* — never reachable from the public internet
    # =========================================================================
    location /internal/ {
        return 403 "Internal endpoint";
    }

    # Block direct key file access (keys only served via Express /api/keys/)
    location /keys/ {
        return 403 "Forbidden: Use /api/keys/ endpoint";
    }

    # =========================================================================
    # Health check
    # =========================================================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","storage":"local"}';
        add_header Content-Type application/json;
    }
}

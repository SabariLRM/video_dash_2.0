version: "3.9"

# =============================================================================
# HUB 2.0 — Local Development Stack
# Storage: Local filesystem (./storage) instead of MinIO
# Services: Redis + MongoDB + Nginx + API + Worker
# =============================================================================

networks:
  hub_net:
    driver: bridge

volumes:
  redis_data:
  mongo_data:

services:
  # ---------------------------------------------------------------------------
  # Redis — BullMQ job queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: hub_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-redishub123}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hub_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redishub123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MongoDB — user profiles, video metadata
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: hub_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-hubuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-hubmongo123}
      MONGO_INITDB_DATABASE: hub_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - hub_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy + JWT-protected HLS delivery
  # Serves HLS: http://localhost:8080/hls/{videoId}/master.m3u8
  # API proxy:  http://localhost:8080/api/
  #
  # Volume mounts:
  #   ./storage/hls  → /var/hls   (Nginx serves encrypted .m3u8 + .ts from here)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: hub_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/hub.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/hls:/var/hls:ro   # Local HLS output folder (read-only for Nginx)
    networks:
      - hub_net

  # ---------------------------------------------------------------------------
  # Express REST API
  # Endpoints: /api/auth, /api/upload, /api/videos, /api/keys, /internal
  #
  # Volume mounts:
  #   ./storage → /app/storage  (API reads keys from /app/storage/keys/)
  #                              (multer saves uploads to /app/storage/uploads/)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hub_api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 4000
      MONGO_URI: mongodb://${MONGO_USER:-hubuser}:${MONGO_PASSWORD:-hubmongo123}@mongo:27017/hub_db?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redishub123}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redishub123}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_256bit}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-hub-internal-secret}
      # Local storage — mapped from ./storage on host
      STORAGE_PATH: /app/storage
      KEY_DELIVERY_BASE_URL: http://localhost:8080/api/keys
      MAX_UPLOAD_SIZE_MB: 2048
    ports:
      - "4000:4000"
    volumes:
      - ./storage:/app/storage   # Full storage mounted so API can write uploads + read keys
    networks:
      - hub_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # FFmpeg transcoding worker
  # Reads source from /app/storage/uploads/, writes HLS to /app/storage/hls/
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: hub_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: development
      REDIS_URL: redis://:${REDIS_PASSWORD:-redishub123}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redishub123}
      INTERNAL_API_URL: http://api:4000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-hub-internal-secret}
      # Local storage — worker reads uploads and writes HLS/keys here
      STORAGE_PATH: /app/storage
      KEY_DELIVERY_BASE_URL: http://localhost:8080/api/keys
    volumes:
      - ./storage:/app/storage   # Shared storage between api + worker
    networks:
      - hub_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
